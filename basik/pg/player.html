<html>
<meta charset="utf-8" />

<head>
	<style>
		canvas {
			border: 1px solid gray;
			background-color: white;
		}

		html,
		body {
			margin: 0px;
			padding: 0px;
			background-color: lightGray;
		}

		.custom-alert-overlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.5);
			display: none;
			/* awalnya hidden */
			justify-content: center;
			align-items: center;
			z-index: 9999;
		}

		.custom-alert-box {
			background: #fff;
			padding: 20px;
			border-radius: 8px;
			min-width: 250px;
			text-align: center;
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
		}

		.custom-alert-box button {
			margin-top: 15px;
			padding: 8px 16px;
			border: none;
			background: #0078d7;
			color: #fff;
			border-radius: 4px;
			cursor: pointer;
		}
	</style>
	<script>
		function loadScriptsSequentially(sources, finalCallback) {
			function loadNext(index) {
				if (index >= sources.length) {
					if (typeof finalCallback === 'function') finalCallback();
					return;
				}

				const script = document.createElement('script');
				script.src = sources[index];
				script.onload = () => loadNext(index + 1);
				script.onerror = () => {
					console.error("Failed to load: " + sources[index]);
					loadNext(index + 1); // Skip failed script and continue
				};
				document.head.appendChild(script);
			}

			loadNext(0);
		}

		function getParam() {
			// Example URL: https://example.com/page?a=1&b=3&c=m2-m3-m4-m5
			// Get the query string from the current page
			const queryString = window.location.search;
			// Create a URLSearchParams object
			const urlParams = new URLSearchParams(queryString);
			// Retrieve the value of parameter 'c'
			const cValue = urlParams.get('demo');
			console.log(cValue); // Output: m2-m3-m4-m5
			return cValue;
		}

		// Example usage:
		loadScriptsSequentially([
			'./editor/lib/basik.min.js?r=${rand}',
			getParam()
		], () => {
			const script = document.createElement('script');
			script.textContent = '//';
			document.head.appendChild(script);
		});
	</script>
</head>

<body>
</body>

</html>
